version: 1.0
provider:
  name: openfaas
  gateway: http://127.0.0.1:8080
functions:
  pidserver:
    lang: python3-edf
    handler: ./pidserver
    image: botondbencs/pidserver:latest
    EDF:
      runtime: "5"
      deadline: "20"
      period: "20"
    labels:
      com.openfaas.scale.min: "1"
      com.openfaas.scale.max: "5"
      com.openfaas.scale.zero: "false"